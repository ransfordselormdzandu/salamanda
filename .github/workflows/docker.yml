name: Docker Workflow

on:
  - push


jobs: 
  docker_build: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Docker Build
        run: docker build -t ${{ vars.CONTAINER_REGISTRY }}/${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:latest  .

      - name: Docker Login
        run: docker login --username=${{ vars.CONTAINER_REGISTRY }} --password-stdin <<< "${{ secrets.DOCKER_HUB_TOKEN }}"

      - name: Docker Publish 
        run: docker push ${{ vars.CONTAINER_REGISTRY }}/${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:latest

  docker_deploy:
    needs: docker_build
    runs-on: ubuntu-latest 

    steps:
      - name: Docker Login
        run: docker login --username=${{ vars.DOCKER_USERNAME }} --password-stdin <<< "${{ secrets.DOCKER_HUB_TOKEN }}"

      - name: Docker Run
        run: docker run -d -p 8080:80 ${{ vars.CONTAINER_REGISTRY }}/${{ vars.DOCKER_USERNAME }}/${{ vars.IMAGE_NAME }}:latest
